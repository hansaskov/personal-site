name: Generate CV PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate PDFs
        run: docker compose run --build --rm playwright

      - name: Commit PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/hans-askov-cv*.pdf
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore: update CV PDFs [skip ci]"
          git push
